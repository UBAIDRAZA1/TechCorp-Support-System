# ==================== NAMESPACE ====================
apiVersion: v1
kind: Namespace
metadata:
  name: crm-digital-fte
  labels:
    name: crm-digital-fte

---
# ==================== CONFIGMAP ====================
apiVersion: v1
kind: ConfigMap
metadata:
  name: crm-config
  namespace: crm-digital-fte
data:
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "crm_digital_fte"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  KAFKA_TOPIC_INCOMING: "incoming_messages"
  KAFKA_TOPIC_OUTGOING: "outgoing_messages"
  LOG_LEVEL: "INFO"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"

---
# ==================== SECRETS ====================
apiVersion: v1
kind: Secret
metadata:
  name: crm-secrets
  namespace: crm-digital-fte
type: Opaque
stringData:
  DATABASE_USER: "postgres"
  DATABASE_PASSWORD: "changeme123"
  OPENAI_API_KEY: "your-openai-api-key"
  TWILIO_ACCOUNT_SID: "your-twilio-sid"
  TWILIO_AUTH_TOKEN: "your-twilio-token"
  GMAIL_CLIENT_ID: "your-gmail-client-id"
  GMAIL_CLIENT_SECRET: "your-gmail-secret"

---
# ==================== POSTGRESQL DEPLOYMENT ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: crm-digital-fte
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: crm-config
                  key: DATABASE_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: crm-secrets
                  key: DATABASE_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crm-secrets
                  key: DATABASE_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: crm-digital-fte
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: crm-digital-fte
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP

---
# ==================== KAFKA DEPLOYMENT (Simplified) ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: crm-digital-fte
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper-service:2181"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-service:9092"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: crm-digital-fte
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
  type: ClusterIP

---
# ==================== API DEPLOYMENT ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: crm-digital-fte
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: crm-digital-fte-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: crm-config
            - secretRef:
                name: crm-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: crm-digital-fte
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8000
  type: LoadBalancer

---
# ==================== WORKER DEPLOYMENT ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: crm-digital-fte
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: crm-digital-fte-worker:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "kafka/worker.py"]
          envFrom:
            - configMapRef:
                name: crm-config
            - secretRef:
                name: crm-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

---
# ==================== FRONTEND DEPLOYMENT ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: crm-digital-fte
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: crm-digital-fte-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: REACT_APP_API_URL
              value: "http://api-service.crm-digital-fte.svc.cluster.local"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: crm-digital-fte
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer

---
# ==================== INGRESS ====================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crm-ingress
  namespace: crm-digital-fte
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: crm.techcorp.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 80

---
# ==================== HPA (Horizontal Pod Autoscaler) ====================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: crm-digital-fte
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ==================== NETWORK POLICY ====================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: crm-network-policy
  namespace: crm-digital-fte
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: crm-digital-fte
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: crm-digital-fte

---
# ==================== MONITORING (ServiceMonitor for Prometheus) ====================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: crm-servicemonitor
  namespace: crm-digital-fte
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: api
  endpoints:
    - port: 8000
      path: /metrics
      interval: 30s
