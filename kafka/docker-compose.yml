version: '3.8'

services:
  # ==================== ZOOKEEPER ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: crm-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - crm-network
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log

  # ==================== KAFKA ====================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: crm-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    networks:
      - crm-network
    volumes:
      - kafka-data:/var/lib/kafka/data

  # ==================== KAFKA UI (Optional) ====================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: crm-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: crm-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - crm-network

  # ==================== KAFKA CREATE TOPICS ====================
  kafka-create-topics:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka
    entrypoint: [
      "/bin/sh",
      "-c",
      "sleep 10;
      kafka-topics --create --if-not-exists --topic incoming_messages --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1;
      kafka-topics --create --if-not-exists --topic outgoing_messages --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1;
      kafka-topics --create --if-not-exists --topic escalations --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1;
      kafka-topics --create --if-not-exists --topic analytics --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1;
      echo 'Topics created successfully!'"
    ]
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
