<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechCorp Support - CRM Digital FTE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .response-card {
            background: #f0fff4;
            border-left: 4px solid #48bb78;
        }

        .response-card.error {
            background: #fff5f5;
            border-left-color: #f56565;
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .ticket-id {
            font-size: 0.9em;
            color: #666;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-open {
            background: #c6f6d5;
            color: #22543d;
        }

        .status-escalated {
            background: #fed7d7;
            color: #742a2a;
        }

        .sentiment-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-top: 10px;
        }

        .sentiment-neutral {
            background: #e2e8f0;
            color: #2d3748;
        }

        .sentiment-positive {
            background: #c6f6d5;
            color: #22543d;
        }

        .sentiment-negative {
            background: #fed7d7;
            color: #742a2a;
        }

        .sentiment-urgent {
            background: #feebc8;
            color: #744210;
        }

        .response-text {
            line-height: 1.7;
            color: #333;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: #f7fafc;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }

        .api-status {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            margin-bottom: 20px;
            color: white;
        }

        .api-status.online {
            background: rgba(72, 187, 120, 0.3);
        }

        .api-status.offline {
            background: rgba(245, 101, 101, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 TechCorp Support</h1>
            <p>AI-Powered Customer Support Agent</p>
        </div>

        <div class="api-status" id="apiStatus">
            Checking API status...
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px;">📝 Submit a Support Ticket</h2>
            <form id="supportForm">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" required placeholder="Your name">
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="channel">Channel *</label>
                    <select id="channel" required>
                        <option value="web">Web Form</option>
                        <option value="email">Email</option>
                        <option value="whatsapp">WhatsApp</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="subject">Subject *</label>
                    <input type="text" id="subject" required placeholder="Brief description of your issue">
                </div>

                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" required placeholder="Describe your issue in detail..."></textarea>
                </div>

                <button type="submit" class="btn" id="submitBtn">
                    🚀 Submit Ticket
                </button>
            </form>
        </div>

        <div id="responseContainer"></div>

        <div class="card">
            <h2 style="margin-bottom: 20px;">📊 System Statistics</h2>
            <div class="stats" id="statsContainer">
                <div class="stat-card">
                    <div class="stat-value" id="totalTickets">-</div>
                    <div class="stat-label">Total Tickets</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="openTickets">-</div>
                    <div class="stat-label">Open</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="escalatedTickets">-</div>
                    <div class="stat-label">Escalated</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="resolvedTickets">-</div>
                    <div class="stat-label">Resolved</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        // Check API status
        async function checkApiStatus() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                document.getElementById('apiStatus').className = 'api-status online';
                document.getElementById('apiStatus').innerHTML = `✅ API Online - ${data.grok_api === 'demo-mode' ? 'Demo Mode' : 'Live'}`;
                loadStats();
            } catch (error) {
                document.getElementById('apiStatus').className = 'api-status offline';
                document.getElementById('apiStatus').innerHTML = '❌ API Offline - Please start the API server';
            }
        }

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/stats`);
                const data = await response.json();
                document.getElementById('totalTickets').textContent = data.total_tickets;
                document.getElementById('openTickets').textContent = data.open_tickets;
                document.getElementById('escalatedTickets').textContent = data.escalated_tickets;
                document.getElementById('resolvedTickets').textContent = data.resolved_tickets;
            } catch (error) {
                console.log('Could not load stats');
            }
        }

        // Submit form
        document.getElementById('supportForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const responseContainer = document.getElementById('responseContainer');

            // Show loading
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Processing...';
            responseContainer.innerHTML = `
                <div class="card loading">
                    <div class="spinner"></div>
                    <p>Analyzing your request...</p>
                </div>
            `;

            // Prepare data
            const data = {
                customer: document.getElementById('email').value,
                channel: document.getElementById('channel').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };

            try {
                const response = await fetch(`${API_BASE}/api/v1/message`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                // Show response
                const sentimentClass = `sentiment-${result.sentiment.sentiment}`;
                const statusClass = result.status === 'escalated' ? 'status-escalated' : 'status-open';

                responseContainer.innerHTML = `
                    <div class="card response-card">
                        <div class="response-header">
                            <div>
                                <strong>✅ Ticket Created!</strong>
                                <div class="ticket-id">Ticket ID: ${result.ticket_id}</div>
                            </div>
                            <span class="status-badge ${statusClass}">${result.status.toUpperCase()}</span>
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <strong>Sentiment Analysis:</strong>
                            <span class="sentiment-badge ${sentimentClass}">
                                ${result.sentiment.sentiment.toUpperCase()} (${(result.sentiment.confidence * 100).toFixed(0)}%)
                            </span>
                        </div>

                        <div class="response-text">${result.response}</div>

                        ${result.escalated ? `
                            <div style="margin-top: 20px; padding: 15px; background: #fff5f5; border-radius: 6px;">
                                <strong>⚠️ This ticket has been escalated to our specialist team.</strong>
                                <p style="margin-top: 10px; color: #666;">You will receive a response within 1 hour.</p>
                            </div>
                        ` : ''}
                    </div>
                `;

                // Reload stats
                loadStats();

            } catch (error) {
                responseContainer.innerHTML = `
                    <div class="card response-card error">
                        <strong>❌ Error</strong>
                        <p style="margin-top: 10px;">${error.message}</p>
                        <p style="margin-top: 10px; color: #666;">Please make sure the API server is running on http://localhost:8000</p>
                    </div>
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Submit Ticket';
            }
        });

        // Initial check
        checkApiStatus();
        setInterval(checkApiStatus, 30000); // Check every 30 seconds
    </script>
</body>
</html>
